plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.applemusickit.AppleMusicKitModule'
version = '0.7.10'

android {
  namespace "expo.modules.applemusickit.AppleMusicKitModule"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation fileTree(dir: 'libs', include: ['*.aar'])
}
